document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

52-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"d61f0f78-9538-4478-bc46-eda7d09df5d1\"><\u002Fscript>\n\n<style>\n  :root {\n    --bg: #0b0c0f;\n    --bg-soft: #111317;\n    --fg: #f5f4f1;\n    --fg-muted: rgba(245, 244, 241, 0.52);\n    --fg-faint: rgba(245, 244, 241, 0.22);\n    --rule: rgba(245, 244, 241, 0.08);\n    --cobalt: #2563EB;\n    --cobalt-soft: rgba(37, 99, 235, 0.16);\n    --serif: \"Instrument Serif\", \"Iowan Old Style\", \"Apple Garamond\", Georgia, serif;\n    --mono: \"JetBrains Mono\", ui-monospace, \"SF Mono\", Menlo, monospace;\n  }\n\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  html { scroll-behavior: smooth; }\n\n  body {\n    background: var(--bg);\n    color: var(--fg);\n    font-family: var(--mono);\n    font-weight: 300;\n    font-size: 14px;\n    line-height: 1.65;\n    letter-spacing: 0.01em;\n    -webkit-font-smoothing: antialiased;\n    -moz-osx-font-smoothing: grayscale;\n    text-rendering: optimizeLegibility;\n    overflow-x: hidden;\n  }\n\n  ::selection {\n    background: var(--cobalt);\n    color: var(--fg);\n  }\n\n  .page {\n    max-width: 880px;\n    margin: 0 auto;\n    padding: clamp(48px, 9vw, 120px) clamp(28px, 6vw, 80px) 120px;\n  }\n\n  /* ── reveal ─────────────────────────────────── */\n  .reveal {\n    opacity: 0;\n    transform: translateY(14px);\n    transition: opacity 1.1s cubic-bezier(.2,.7,.2,1), transform 1.1s cubic-bezier(.2,.7,.2,1);\n    transition-delay: var(--d, 0ms);\n    will-change: opacity, transform;\n  }\n  .reveal.is-in { opacity: 1; transform: none; }\n\n  /* ── meta strip ─────────────────────────────── */\n  .meta {\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n    gap: 24px;\n    font-family: var(--mono);\n    font-size: 11.5px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--fg-muted);\n    margin-bottom: clamp(80px, 14vw, 160px);\n  }\n  .meta .dot {\n    display: inline-block;\n    width: 6px; height: 6px; border-radius: 50%;\n    background: var(--cobalt);\n    margin-right: 8px;\n    transform: translateY(-1px);\n    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);\n  }\n\n  /* ── hero ───────────────────────────────────── */\n  .hero {\n    display: grid;\n    grid-template-columns: 1fr auto;\n    gap: clamp(28px, 5vw, 60px);\n    align-items: end;\n    margin-bottom: clamp(40px, 7vw, 80px);\n  }\n  .hero h1 {\n    font-family: var(--serif);\n    font-weight: 400;\n    font-size: clamp(56px, 9.5vw, 120px);\n    line-height: 0.94;\n    letter-spacing: -0.012em;\n    margin: 0;\n    color: var(--fg);\n  }\n  .hero h1 .em {\n    font-style: italic;\n    color: var(--fg);\n  }\n  .hero h1 .stop {\n    color: var(--cobalt);\n  }\n\n  .photo {\n    width: clamp(96px, 13vw, 168px);\n    height: clamp(96px, 13vw, 168px);\n    flex-shrink: 0;\n    position: relative;\n  }\n  .photo image-slot {\n    width: 100%;\n    height: 100%;\n    border-radius: 50%;\n    background: var(--cobalt);\n    box-shadow: 0 24px 64px -24px rgba(37, 99, 235, 0.55);\n    --slot-border: rgba(245, 244, 241, 0.06);\n  }\n  .photo::after {\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    border-radius: 50%;\n    pointer-events: none;\n    background: radial-gradient(120% 120% at 30% 25%, transparent 55%, rgba(11, 12, 15, 0.45) 100%);\n    mix-blend-mode: multiply;\n    opacity: 0.6;\n  }\n\n  .tagline {\n    margin-top: clamp(24px, 4vw, 44px);\n    max-width: 56ch;\n  }\n  .tagline p {\n    margin: 0;\n    font-family: var(--serif);\n    font-size: clamp(22px, 2.6vw, 30px);\n    line-height: 1.32;\n    font-style: italic;\n    color: var(--fg);\n    letter-spacing: -0.005em;\n    text-wrap: balance;\n  }\n  .tagline p .pull {\n    color: var(--cobalt);\n  }\n\n  .locus {\n    margin-top: 28px;\n    display: flex;\n    flex-wrap: wrap;\n    gap: 14px 28px;\n    font-size: 11.5px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--fg-muted);\n  }\n  .locus .sep {\n    color: var(--fg-faint);\n  }\n\n  /* ── section scaffolding ───────────────────── */\n  section {\n    padding-top: clamp(96px, 13vw, 160px);\n  }\n  .label {\n    font-family: var(--mono);\n    font-size: 11.5px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--fg-muted);\n    margin: 0 0 clamp(32px, 5vw, 56px) 0;\n    display: flex;\n    align-items: center;\n    gap: 14px;\n  }\n  .label::before {\n    content: \"\";\n    display: inline-block;\n    width: 22px;\n    height: 1px;\n    background: var(--cobalt);\n  }\n\n  /* ── what i do ─────────────────────────────── */\n  .grid {\n    display: grid;\n    grid-template-columns: repeat(2, minmax(0, 1fr));\n    gap: clamp(40px, 5vw, 56px) clamp(48px, 6vw, 72px);\n  }\n  .block h3 {\n    font-family: var(--serif);\n    font-weight: 400;\n    font-size: clamp(28px, 3.4vw, 36px);\n    line-height: 1.1;\n    letter-spacing: -0.01em;\n    margin: 0 0 14px 0;\n    color: var(--fg);\n  }\n  .block p {\n    margin: 0;\n    font-size: 13.5px;\n    line-height: 1.7;\n    color: var(--fg-muted);\n    max-width: 38ch;\n    text-wrap: pretty;\n  }\n  .block .idx {\n    display: inline-block;\n    font-family: var(--mono);\n    font-size: 10.5px;\n    letter-spacing: 0.18em;\n    color: var(--cobalt);\n    margin-bottom: 14px;\n  }\n\n  /* ── currently building list ───────────────── */\n  .ledger {\n    border-top: 1px solid var(--rule);\n  }\n  .row {\n    display: grid;\n    grid-template-columns: 22px 1fr auto;\n    align-items: baseline;\n    gap: 24px;\n    padding: 22px 0;\n    border-bottom: 1px solid var(--rule);\n    transition: padding 0.5s cubic-bezier(.2,.7,.2,1), background 0.5s ease;\n  }\n  .row:hover {\n    padding-left: 8px;\n    padding-right: 8px;\n    background: linear-gradient(90deg, transparent, rgba(37, 99, 235, 0.04 n;\n    align-items: center;\n    padding: 24px 0;\n    border-bottom: 1px solid var(--rule);\n    color: var(--fg);\n    text-decoration: none;\n    font-family: var(--mono);\n    font-size: 13px;\n    letter-spacing: 0.04em;\n    transition: color 0.3s ease, padding 0.4s cubic-bezier(.2,.7,.2,1);\n    position: relative;\n  }\n  .link:nth-child(odd) { padding-right: 28px; border-right: 1px solid var(--rule); }\n  .link:nth-child(even) { padding-left: 28px; }\n  .link .arr {\n    color: var(--fg-faint);\n    transition: transform 0.4s cubic-bezier(.2,.7,.2,1), color 0.3s ease;\n  }\n  .link:hover { color: var(--cobalt); }\n  .link:hover .arr { color: var(--cobalt); transform: translate(4px, -4px); }\n  .link .handle {\n    color: var(--fg-muted);\n    font-size: 11.5px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    margin-right: 14px;\n  }\n  .link .name {\n    display: flex;\n    align-items: baseline;\n    gap: 14px;\n  }\n  .link .name strong {\n    font-family: var(--serif);\n    font-weight: 400;\n    font-style: normal;\n    font-size: 22px;\n    letter-spacing: -0.005em;\n  }\n\n  /* ── footer ────────────────────────────────── */\n  footer {\n    margin-top: clamp(96px, 13vw, 140px);\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n    gap: 24px;\n    font-family: var(--mono);\n    font-size: 11px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--fg-faint);\n  }\n\n  /* ── tablet (641 – 1024) ───────────────────── */\n  @media (max-width: 1024px) {\n    .page {\n      padding: clamp(56px, 8vw, 96px) clamp(32px, 6vw, 64px) 96px;\n    }\n    .hero h1 {\n      font-size: clamp(64px, 11vw, 96px);\n    }\n    .photo {\n      width: clamp(110px, 16vw, 148px);\n      height: clamp(110px, 16vw, 148px);\n    }\n    .tagline p {\n      font-size: clamp(22px, 3.2vw, 28px);\n    }\n    .block h3 {\n      font-size: clamp(26px, 3.8vw, 32px);\n    }\n    .row {\n      grid-template-col
